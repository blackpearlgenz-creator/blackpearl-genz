<section class="hero">

  <div class="footer-links">

</footer>

<script src="products-data.js"></script>
<script>
  const grid = document.getElementById('product-grid');

  DESIGNS.forEach((d, index) => {
    const card = document.createElement('a');
    card.href = `product.html?code=${encodeURIComponent(d.code)}`;
    card.className = 'card reveal';
    card.style.transitionDelay = `${index * 80}ms`;

    card.innerHTML = `
      <div class="card-image">
        <img class="card-img" src="${d.fits[0].images[0]}" data-images='${JSON.stringify(d.fits[0].images)}' data-index="0"
             alt="${d.code}" onerror="this.parentElement.innerHTML='${d.code} — add photo';">
      </div>
      <div class="card-body">
        <div class="card-name display">${d.code}</div>
        <div class="card-sub">${d.name}</div>
        <div class="card-desc">${d.description}</div>
        <div class="card-price">From <span>₹</span>${d.cardPrice}</div>
      </div>
    `;
    grid.appendChild(card);
  });

  // Auto-cycle each card's photo gallery
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!prefersReducedMotion) {
    setInterval(() => {
      document.querySelectorAll('.card-img').forEach(img => {
        let images;
        try { images = JSON.parse(img.dataset.images); } catch (e) { return; }
        if (!images || images.length <= 1) return;
        let idx = (parseInt(img.dataset.index, 10) + 1) % images.length;
        img.dataset.index = idx;
        img.style.opacity = 0;
        setTimeout(() => { img.src = images[idx]; img.style.opacity = 1; }, 350);
      });
    }, 3200);
  }

  // Fade-up reveal on scroll
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
</script>

</body>
</html>
